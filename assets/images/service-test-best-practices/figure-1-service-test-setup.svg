<svg width="720" height="340" viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="f1title f1desc" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="f1title">Figure 1 — Service test setup</title>
  <desc id="f1desc">The service under test, in its own colour, is surrounded by its dependencies in two colours: real dependencies that run in Docker, and stubbed fakes. Worked example: payments-api with a Docker Postgres and WireMock stubbing the payment gateway upstream.</desc>
  <defs>
    <marker id="f1arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#475467"/></marker>
  </defs>

  <!-- service under test (own colour) -->
  <rect x="56" y="118" width="184" height="88" rx="12" fill="#002966"/>
  <text x="148" y="156" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">payments-api</text>
  <text x="148" y="180" text-anchor="middle" fill="#ffffff" font-size="12" opacity="0.92">service under test</text>

  <!-- connections -->
  <line x1="240" y1="150" x2="412" y2="110" stroke="#475467" stroke-width="2" marker-end="url(#f1arr)"/>
  <text x="326" y="118" text-anchor="middle" fill="#667085" font-size="11">real connection</text>
  <line x1="240" y1="176" x2="412" y2="254" stroke="#475467" stroke-width="2" marker-end="url(#f1arr)"/>
  <text x="300" y="238" text-anchor="middle" fill="#667085" font-size="11">over real HTTP</text>

  <!-- real dependency (Docker) -->
  <rect x="416" y="76" width="248" height="74" rx="12" fill="#F6FEF9" stroke="#12B76A" stroke-width="2"/>
  <text x="540" y="108" text-anchor="middle" fill="#067647" font-size="15" font-weight="700">PostgreSQL</text>
  <text x="540" y="130" text-anchor="middle" fill="#475467" font-size="12">real dependency · runs in Docker</text>

  <!-- stubbed fake -->
  <rect x="416" y="216" width="248" height="74" rx="12" fill="#FFFAEB" stroke="#F79009" stroke-width="2"/>
  <text x="540" y="248" text-anchor="middle" fill="#B54708" font-size="15" font-weight="700">Payment Gateway</text>
  <text x="540" y="270" text-anchor="middle" fill="#475467" font-size="12">stubbed by WireMock (fake)</text>

  <!-- legend -->
  <rect x="56" y="309" width="14" height="14" rx="3" fill="#002966"/>
  <text x="78" y="320" fill="#344054" font-size="12">service under test</text>
  <rect x="232" y="309" width="14" height="14" rx="3" fill="#F6FEF9" stroke="#12B76A" stroke-width="2"/>
  <text x="254" y="320" fill="#344054" font-size="12">real dependency (Docker)</text>
  <rect x="466" y="309" width="14" height="14" rx="3" fill="#FFFAEB" stroke="#F79009" stroke-width="2"/>
  <text x="488" y="320" fill="#344054" font-size="12">stubbed fake (WireMock)</text>
</svg>
